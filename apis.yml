name: Flo Health
type: Index
kind: company
description: >-
  Flo Health operates the Flo app, a leading consumer period, ovulation,
  pregnancy, and reproductive health tracker with hundreds of millions of
  downloads worldwide. The product surface includes cycle tracking, ovulation
  and pregnancy predictions, an AI-assisted symptom checker, Secret Chats, Flo
  for Partners (partner-shared mode), Anonymous Mode, and a Premium
  subscription tier. Flo's Medical Affairs team partners with clinicians and
  researchers on women's health science. Flo is a consumer mobile product;
  no public developer API or partner API portal has been identified at this
  time. This entry catalogs the company surface for the API Evangelist index.
